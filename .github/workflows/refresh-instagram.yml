name: Refresh Instagram wall

on:
  schedule:
    - cron: "23 10 * * *" # daily, 10:23 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install puppeteer
        run: npm install puppeteer@23

      - name: Fetch latest post images
        run: node scripts/fetch-instagram.mjs

      - name: Commit refreshed images if they changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/img/insta
          git diff --cached --quiet || (git commit -m "Refresh Instagram wall" && git push)
